<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Table Scanner</title>

<!-- QR code scanning library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  background:#222; /* DARKER GREY */
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;
  margin:0;
  padding:30px;
}

h1{
  font-size:32px;
}

#reader{
  width:100%;
  max-width:650px;
  margin:auto;
}

#result{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1 id="tableTitle">Table Scanner</h1>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>
// --------------------------
// CONFIG
// --------------------------
// Replace with your Apps Script Web App deployment URL
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz1JxDu3mEVCh0tCWWJQKF0x1xCFFv9EgpFEOokRIiAwvk3uxsAOayURRUGUwsKzxRzkQ/exec";

// --------------------------
// Get table number from URL parameter
// e.g., scanner.html?table=3
// --------------------------
const params = new URLSearchParams(window.location.search);
const tableId = params.get("table") || "1";

document.getElementById("tableTitle").innerText = "Table " + tableId + " Scanner";

// --------------------------
// Mobile detection
// --------------------------
function isMobile() {
 return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}

// --------------------------
// Camera configuration
// Back-facing camera for mobile, front for desktop
// --------------------------
let cameraConfig;

if(isMobile()){
 cameraConfig = { facingMode: { exact: "environment" } };
}else{
 cameraConfig = { facingMode: "user" };
}

// --------------------------
// Scan lock to prevent rapid duplicate scans
// --------------------------
let scanLock = false;

// --------------------------
// QR scan success handler
// --------------------------
function onScanSuccess(decodedText) {

 if(scanLock) return; // prevent multiple triggers
 scanLock = true;

 let qrId = decodedText;

 // If QR contains a URL like ?id=XXXXX, extract the ID
 if(decodedText.includes("id=")){
   let url = new URL(decodedText);
   qrId = url.searchParams.get("id");
 }

 document.getElementById("result").innerText = "Processing...";

 // --------------------------
 // Send scan to Apps Script
 // Use no-cors mode to avoid CORS issues
 // --------------------------
 fetch(`${WEBAPP_URL}?qr_id=${qrId}&table_id=${tableId}`, {
   method: "GET",
   mode: "no-cors"
 })
 .then(() => {
   document.getElementById("result").innerText = "Scan recorded";
 })
 .catch(err => {
   console.error(err);
   document.getElementById("result").innerText = "Connection sent";
 });

 // Unlock after 2 seconds to allow next scan
 setTimeout(()=>{ scanLock=false; }, 2000);
}

// --------------------------
// Start the QR scanner
// --------------------------
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
 cameraConfig,
 { fps:10, qrbox:350 },
 onScanSuccess
);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Table Scanner</title>

<!-- CSP-safe QR scanner library -->
<script src="./js/html5-qrcode.min.js"></script>

<style>
body {
  background: #444; /* mid-grey */
  font-family: Arial, Helvetica, sans-serif;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  font-size: 32px;
  margin-bottom: 20px;
}

#reader {
  width: 100%;
  max-width: 800px; /* larger preview */
  margin: 0 auto;
  border: 4px solid #333;
  border-radius: 12px;
  box-shadow: 0 0 20px #000;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#result {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
  transition: color 0.3s;
}

/* Flash animation for scan success */
.flash-success {
  animation: flashGreen 0.5s;
}

@keyframes flashGreen {
  0% { border-color: #0f0; box-shadow: 0 0 20px #0f0; }
  50% { border-color: #fff; box-shadow: 0 0 20px #fff; }
  100% { border-color: #333; box-shadow: 0 0 20px #000; }
}
</style>
</head>

<body>

<h1 id="tableTitle">Table Scanner</h1>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>
// --------------------------
// CONFIG
// --------------------------
// Replace with your Apps Script Web App URL
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz1JxDu3mEVCh0tCWWJQKF0x1xCFFv9EgpFEOokRIiAwvk3uxsAOayURRUGUwsKzxRzkQ/exec";

// --------------------------
// Get table number from URL (e.g., scanner.html?table=3)
// --------------------------
const params = new URLSearchParams(window.location.search);
const tableId = params.get("table") || "1";
document.getElementById("tableTitle").innerText = "Table " + tableId + " Scanner";

// --------------------------
// Mobile detection
// --------------------------
function isMobile() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}

// --------------------------
// Camera configuration
// Back-facing for mobile, front for desktop
// --------------------------
let cameraConfig = isMobile()
  ? { facingMode: { exact: "environment" } }
  : { facingMode: "user" };

// --------------------------
// Scan lock prevents multiple triggers in rapid succession
// --------------------------
let scanLock = false;

// --------------------------
// QR scan success handler
// --------------------------
function onScanSuccess(decodedText) {
  if (scanLock) return;
  scanLock = true;

  let qrId = decodedText;
  // If QR contains a URL like ?id=XXXXX, extract the ID
  if (decodedText.includes("id=")) {
    let url = new URL(decodedText);
    qrId = url.searchParams.get("id");
  }

  document.getElementById("result").innerText = "Processing...";

  // --------------------------
  // Send POST request to Apps Script backend
  // --------------------------
  let formData = new FormData();
  formData.append("qr_id", qrId);
  formData.append("table_id", tableId);

  fetch(WEBAPP_URL, {
    method: "POST",
    body: formData,
    mode: "no-cors" // avoids CORS issues
  })
  .then(() => {
    // Green flash + success message
    document.getElementById("result").innerText = "Scan recorded";
    const readerDiv = document.getElementById("reader");
    readerDiv.classList.add("flash-success");
    setTimeout(() => { readerDiv.classList.remove("flash-success"); }, 500);
  })
  .catch(err => {
    console.error("Fetch error:", err);
    document.getElementById("result").innerText = "Error sending scan";
  });

  // Unlock after 2 seconds
  setTimeout(() => { scanLock = false; }, 2000);
}

// --------------------------
// Start the QR scanner
// --------------------------
const html5QrCode = new Html5Qrcode("reader");
const scannerConfig = { fps: 10, qrbox: 400 }; // higher FPS & larger box

html5QrCode.start(
  cameraConfig,
  scannerConfig,
  onScanSuccess
);
</script>

</body>
</html>

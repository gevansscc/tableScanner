<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Table Scanner</title>

<!-- CSP-safe QR scanner library -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
/* ------------------ General Layout ------------------ */
body {
  background: #555; /* mid-grey background */
  font-family: Arial, Helvetica, sans-serif;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  font-size: 32px;
  margin-bottom: 20px;
}

/* ------------------ Video Preview ------------------ */
#reader {
  width: 100%;
  max-width: 800px; /* larger preview */
  margin: 0 auto;
  border: 4px solid #333;
  border-radius: 12px;
  box-shadow: 0 0 20px #000;
  transition: border-color 0.2s, box-shadow 0.2s;
}

/* ------------------ Scan Result ------------------ */
#result {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
  transition: color 0.3s;
}

/* ------------------ Flash animation ------------------ */
.flash-success {
  animation: flashGreen 0.5s;
}

@keyframes flashGreen {
  0% { border-color: #0f0; box-shadow: 0 0 20px #0f0; }
  50% { border-color: #fff; box-shadow: 0 0 20px #fff; }
  100% { border-color: #333; box-shadow: 0 0 20px #000; }
}
</style>
</head>

<body>

<h1 id="tableTitle">Table Scanner</h1>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>
// --------------------------
// CONFIG - Update this
// --------------------------
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz1JxDu3mEVCh0tCWWJQKF0x1xCFFv9EgpFEOokRIiAwvk3uxsAOayURRUGUwsKzxRzkQ/exec"; // <- Replace with your Apps Script URL

// --------------------------
// Get table number from URL parameter
// e.g., scanner.html?table=3
// --------------------------
const params = new URLSearchParams(window.location.search);
const tableId = params.get("table") || "1";
document.getElementById("tableTitle").innerText = "Table " + tableId + " Scanner";

// --------------------------
// Mobile detection
// --------------------------
function isMobile() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}

// --------------------------
// Camera configuration
// Back camera for mobile, front for desktop
// --------------------------
let cameraConfig = isMobile()
  ? { facingMode: { exact: "environment" } }
  : { facingMode: "user" };

// --------------------------
// Scan lock to prevent duplicate scans
// --------------------------
let scanLock = false;

// --------------------------
// QR scan success handler
// --------------------------
function onScanSuccess(decodedText) {
  if(scanLock) return;
  scanLock = true;

  let qrId = decodedText;

  // Extract ID from URL if needed
  if(decodedText.includes("id=")) {
    let url = new URL(decodedText);
    qrId = url.searchParams.get("id");
  }

  document.getElementById("result").innerText = "Processing...";

  // --------------------------
  // Send scan to Apps Script (no-cors mode)
  // --------------------------
  fetch(`${WEBAPP_URL}?qr_id=${qrId}&table_id=${tableId}`, {
    method: "GET",
    mode: "no-cors"
  })
  .then(() => {
    document.getElementById("result").innerText = "Scan recorded";

    // Flash green border to show success
    const readerDiv = document.getElementById("reader");
    readerDiv.classList.add("flash-success");
    setTimeout(() => {
      readerDiv.classList.remove("flash-success");
    }, 500);

  })
  .catch(err => {
    console.error(err);
    document.getElementById("result").innerText = "Connection sent";
  });

  // Unlock after 2 seconds
  setTimeout(()=>{ scanLock=false; }, 2000);
}

// --------------------------
// Start QR scanner
// --------------------------
const html5QrCode = new Html5Qrcode("reader");
const scannerConfig = { fps: 20, qrbox: 400 }; // Larger box and faster fps

html5QrCode.start(
  cameraConfig,
  scannerConfig,
  onScanSuccess
);
</script>

</body>
</html>

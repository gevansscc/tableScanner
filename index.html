<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Table Scanner</title>

<!-- ✅ Updated QR code library from jsDelivr (CSP-safe) -->
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

<style>
body{
  background:#222; /* DARKER GREY */
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;
  margin:0;
  padding:30px;
}

h1{
  font-size:32px;
}

#reader{
  width:100%;
  max-width:650px;
  margin:auto;
}

#result{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1 id="tableTitle">Table Scanner</h1>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>
// --------------------------
// CONFIG - Replace this with your Apps Script Web App URL
// --------------------------
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz1JxDu3mEVCh0tCWWJQKF0x1xCFFv9EgpFEOokRIiAwvk3uxsAOayURRUGUwsKzxRzkQ/exec"; 

// --------------------------
// Get table number from URL param, e.g., scanner.html?table=3
// --------------------------
const params = new URLSearchParams(window.location.search);
const tableId = params.get("table") || "1";
document.getElementById("tableTitle").innerText = "Table " + tableId + " Scanner";

// --------------------------
// Mobile detection
// --------------------------
function isMobile() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}

// --------------------------
// Camera configuration
// Back-facing camera for mobile, front for desktop
// --------------------------
let cameraConfig = isMobile()
  ? { facingMode: { exact: "environment" } }
  : { facingMode: "user" };

// --------------------------
// Scan lock to prevent rapid duplicate scans
// --------------------------
let scanLock = false;

// --------------------------
// QR scan success handler
// --------------------------
function onScanSuccess(decodedText) {

  if(scanLock) return; // prevent multiple triggers
  scanLock = true;

  let qrId = decodedText;

  // Extract ID if QR contains a URL with ?id=XXXXX
  if(decodedText.includes("id=")){
    let url = new URL(decodedText);
    qrId = url.searchParams.get("id");
  }

  document.getElementById("result").innerText = "Processing...";

  // --------------------------
  // Send scan to Apps Script backend
  // Use no-cors mode to avoid CORS issues
  // --------------------------
  fetch(`${WEBAPP_URL}?qr_id=${qrId}&table_id=${tableId}`, {
    method: "GET",
    mode: "no-cors" // avoids CORS issues with Apps Script
  })
  .then(() => {
    document.getElementById("result").innerText = "Scan recorded";
  })
  .catch(err => {
    console.error(err);
    document.getElementById("result").innerText = "Scan sent";
  });

  // Unlock after 2 seconds to allow next scan
  setTimeout(()=>{ scanLock=false; }, 2000);
}

// --------------------------
// Start the QR scanner
// --------------------------
const html5QrCode = new Html5Qrcode("reader");

// ✅ Adjusted fps for performance
// Higher FPS = more responsive but more CPU usage
const scannerConfig = { fps: 20, qrbox: 350 }; 

html5QrCode.start(
  cameraConfig,
  scannerConfig,
  onScanSuccess
);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Table Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  background:#444;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;
  margin:0;
  padding:30px;
}

h1{
  font-size:32px;
}

#reader{
  width:100%;
  max-width:650px;
  margin:auto;
}

#result{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}

</style>
</head>

<body>

<h1 id="tableTitle">Table Scanner</h1>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>

// ----------------------------------
// CONFIG
// ----------------------------------

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz1JxDu3mEVCh0tCWWJQKF0x1xCFFv9EgpFEOokRIiAwvk3uxsAOayURRUGUwsKzxRzkQ/exec";


// ----------------------------------
// GET TABLE NUMBER FROM URL
// ----------------------------------

const params = new URLSearchParams(window.location.search);
const tableId = params.get("table") || "1";

document.getElementById("tableTitle").innerText = "Table " + tableId + " Scanner";


// ----------------------------------
// MOBILE DETECTION
// ----------------------------------

function isMobile() {
 return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}


// ----------------------------------
// CAMERA SELECTION
// ----------------------------------

let cameraConfig;

if(isMobile()){
 cameraConfig = { facingMode: { exact: "environment" } };
}else{
 cameraConfig = { facingMode: "user" };
}


// ----------------------------------
// QR SCAN SUCCESS
// ----------------------------------

function onScanSuccess(decodedText) {

 let qrId = decodedText;

 // if QR contains a URL like ?id=XXXXX extract it
 if(decodedText.includes("id=")){
   let url = new URL(decodedText);
   qrId = url.searchParams.get("id");
 }

 document.getElementById("result").innerText = "Processing...";

 fetch(`${WEBAPP_URL}?qr_id=${qrId}&table_id=${tableId}`)
   .then(res => res.text())
   .then(data => {

      document.getElementById("result").innerText = data;

   })
   .catch(err=>{
      document.getElementById("result").innerText = "Error";
      console.error(err);
   });

}


// ----------------------------------
// START SCANNER
// ----------------------------------

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
 cameraConfig,
 {
   fps:10,
   qrbox:350
 },
 onScanSuccess
);

</script>

</body>
</html>

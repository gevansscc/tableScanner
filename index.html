<!DOCTYPE html>
<html>
<head>
  <title>Table Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h1>Table 1 Scanner</h1>
  <div id="reader" style="width:300px"></div>
  <div id="result"></div>

  <script>
    const tableId = 1; // set table number

    function onScanSuccess(decodedText, decodedResult) {
      document.getElementById('result').innerText = 'Scanned: ' + decodedText;

      // Send student ID + table ID to Google Sheet (via Apps Script web app)
      fetch('https://script.google.com/macros/s/YOUR_DEPLOYED_SCRIPT_ID/exec?student_id=' + decodedText + '&table_id=' + tableId)
        .then(response => response.text())
        .then(data => document.getElementById('result').innerText = data)
        .catch(err => document.getElementById('result').innerText = 'Error: ' + err);
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10 }, onScanSuccess);
  </script>
</body>
</html>

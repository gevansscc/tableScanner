<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Table Scanner</title>

<!-- Self-hosted html5-qrcode or CSP-safe version -->
<script src="js/html5-qrcode.min.js"></script>

<style>
body {
  background: #444; /* dark grey */
  font-family: Arial, Helvetica, sans-serif;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  font-size: 32px;
  margin-bottom: 20px;
}

#reader {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  border: 4px solid #333;
  border-radius: 12px;
  box-shadow: 0 0 20px #000;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#result {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
  transition: color 0.3s;
}

#progress {
  margin-top: 10px;
  font-size: 20px;
  color: #0f0;
}

.error-message {
  color: #f00;
}

.flash-success {
  animation: flashGreen 0.5s;
}

@keyframes flashGreen {
  0% { border-color: #0f0; box-shadow: 0 0 20px #0f0; }
  50% { border-color: #fff; box-shadow: 0 0 20px #fff; }
  100% { border-color: #333; box-shadow: 0 0 20px #000; }
}
</style>
</head>

<body>

<h1 id="tableTitle">Table Scanner</h1>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>
<div id="progress">Tables visited: 0 / 10</div>

<!-- Beep sound on success -->
<audio id="beep" src="beep.mp3" preload="auto"></audio>

<script>
// --------------------------
// CONFIG
// --------------------------
// Replace with your Apps Script Web App deployment URL
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz1JxDu3mEVCh0tCWWJQKF0x1xCFFv9EgpFEOokRIiAwvk3uxsAOayURRUGUwsKzxRzkQ/exec";
const TOTAL_TABLES = 10; // total tables in event

// --------------------------
// Get table number from URL, e.g., scanner.html?table=3
// --------------------------
const params = new URLSearchParams(window.location.search);
const tableId = params.get("table") || "1";
document.getElementById("tableTitle").innerText = "Table " + tableId + " Scanner";

// --------------------------
// Mobile detection
// --------------------------
function isMobile() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}

// --------------------------
// Camera configuration
// --------------------------
let cameraConfig = isMobile() 
  ? { facingMode: { exact: "environment" } }
  : { facingMode: "user" };

// --------------------------
// Scan lock
// --------------------------
let scanLock = false;

// --------------------------
// Update live table count
// --------------------------
function updateProgress(qrId){
  fetch(`${WEBAPP_URL}?action=count&qr_id=${qrId}`)
    .then(res=>res.json())
    .then(data=>{
      document.getElementById("progress").innerText =
        `Tables visited: ${data.count} / ${data.totalTables}`;
    })
    .catch(err=>console.error("Progress fetch error:", err));
}

// --------------------------
// Handle scan success
// --------------------------
function onScanSuccess(decodedText){
  if(scanLock) return;
  scanLock = true;

  let qrId = decodedText;
  if(decodedText.includes("id=")){
    let url = new URL(decodedText);
    qrId = url.searchParams.get("id");
  }

  document.getElementById("result").classList.remove("error-message");
  document.getElementById("result").innerText = "Processing...";

  // --------------------------
  // POST scan to Apps Script
  // --------------------------
  let formData = new FormData();
  formData.append("qr_id", qrId);
  formData.append("table_id", tableId);

  fetch(WEBAPP_URL, {
    method: "POST",
    body: formData,
    mode: "no-cors" // avoids CORS errors
  })
  .then(() => {
    // Flash + beep
    document.getElementById("result").innerText = "Scan recorded";
    const readerDiv = document.getElementById("reader");
    readerDiv.classList.add("flash-success");
    document.getElementById("beep").play();
    setTimeout(()=>{ readerDiv.classList.remove("flash-success"); }, 500);

    // Update progress
    updateProgress(qrId);
  })
  .catch(err => {
    console.error("Fetch error:", err);
    document.getElementById("result").classList.add("error-message");
    document.getElementById("result").innerText = "Error sending scan";
  });

  // Unlock after 2 seconds
  setTimeout(()=>{ scanLock = false; }, 2000);
}

// --------------------------
// Initialize QR scanner
// --------------------------
const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  cameraConfig,
  { fps: 20, qrbox: 400 },
  onScanSuccess
);
</script>

</body>
</html>

</body>
</html>
